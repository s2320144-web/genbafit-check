<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現場fit チェック</title>

  <!-- LIFF -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <!-- ヘッダー -->
    <div class="header">
      <h1>現場fit チェック</h1>
      <p>20秒で入力｜再発防止のための簡易チェック</p>
    </div>

    <div class="screen">

      <!-- STEP1 -->
      <section class="card" id="step1">
        <h2>違和感の部位</h2>

        <button id="noPainBtn" class="option-btn">特にない</button>

        <div id="partOptions">
          <button class="option-btn" data-value="腰">腰</button>
          <button class="option-btn" data-value="肩">肩</button>
          <button class="option-btn" data-value="膝">膝</button>
          <button class="option-btn" data-value="その他">その他</button>
        </div>

        <div id="otherPartWrap" class="hidden">
          <input id="otherPart" placeholder="その他を入力">
        </div>

        <button id="toStep2" disabled>次へ</button>
      </section>

      <!-- STEP2 -->
      <section class="card hidden" id="step2">
        <h2>痛みの強さ</h2>

        <div id="scoreOptions"></div>

        <button class="back" data-back="1">戻る</button>
        <button id="toStep3" disabled>次へ</button>
      </section>

      <!-- STEP3 -->
      <section class="card hidden" id="step3">
        <h2>前週比</h2>

        <div id="trendOptions">
          <button class="option-btn" data-value="良くなった">良くなった</button>
          <button class="option-btn" data-value="変わらない">変わらない</button>
          <button class="option-btn" data-value="悪くなった">悪くなった</button>
        </div>

        <input id="team" placeholder="班・工区（任意）">

        <button class="back" data-back="2">戻る</button>
        <button id="toStep4" disabled>次へ</button>
      </section>

      <!-- STEP4 -->
      <section class="card hidden" id="step4">
        <h2>作業内容</h2>

        <div id="workOptions">
          <button class="option-btn" data-value="中腰作業">中腰</button>
          <button class="option-btn" data-value="重量物">重量物</button>
          <button class="option-btn" data-value="高所作業">高所</button>
          <button class="option-btn" data-value="ねじり動作">ねじり</button>
          <button class="option-btn" data-value="長時間立ち">立ち作業</button>
          <button class="option-btn" data-value="その他">その他</button>
        </div>

        <div id="otherWorkWrap" class="hidden">
          <input id="otherWork" placeholder="その他作業">
        </div>

        <textarea id="memo" placeholder="メモ"></textarea>

        <button class="back" data-back="3">戻る</button>
        <button id="toStep5" disabled>次へ</button>
      </section>

      <!-- STEP5 -->
      <section class="card hidden" id="step5">
        <h2>確認</h2>

        <div id="confirmPart"></div>
        <div id="confirmScore"></div>
        <div id="confirmTrend"></div>
        <div id="confirmTeam"></div>
        <div id="confirmWork"></div>
        <div id="confirmMemo"></div>

        <button class="back" data-back="4">戻る</button>
        <button id="submitBtn">送信</button>
      </section>

      <!-- 完了 -->
      <section class="card hidden" id="done">
        <h2>送信完了</h2>
        <p id="doneMessage"></p>
        <div id="doneSummary"></div>
        <button id="closeBtn">閉じる</button>
      </section>

    </div>
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
