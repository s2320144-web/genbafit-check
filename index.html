<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>現場fit チェック</title>

  <!-- LINE -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <!-- フォント -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

  <!-- ヘッダー -->
  <div class="header">
    <h1>現場fit チェック</h1>
    <p>20秒で入力｜再発防止</p>
  </div>

  <!-- STEP1 -->
  <div class="card" id="step1">
    <h2>違和感の部位</h2>

    <button id="noPainBtn" class="btn">特にない</button>

    <div class="grid">
      <button class="btn part" data-value="腰">腰</button>
      <button class="btn part" data-value="肩">肩</button>
      <button class="btn part" data-value="膝">膝</button>
      <button class="btn part" data-value="その他">その他</button>
    </div>

    <button id="toStep2" class="next" disabled>次へ</button>
  </div>

  <!-- STEP2 -->
  <div class="card hidden" id="step2">
    <h2>痛みの強さ</h2>

    <div class="score">
      <button data-score="1">😄<br>1</button>
      <button data-score="2">🙂<br>2</button>
      <button data-score="3">😐<br>3</button>
      <button data-score="4">😣<br>4</button>
      <button data-score="5">😫<br>5</button>
    </div>

    <button id="toStep3" class="next" disabled>次へ</button>
  </div>

  <!-- STEP3 -->
  <div class="card hidden" id="step3">
    <h2>前週比</h2>

    <button class="btn trend" data-value="良くなった">良くなった</button>
    <button class="btn trend" data-value="変わらない">変わらない</button>
    <button class="btn trend" data-value="悪くなった">悪くなった</button>

    <button id="toStep4" class="next" disabled>次へ</button>
  </div>

  <!-- STEP4 -->
  <div class="card hidden" id="step4">
    <h2>作業</h2>

    <button class="btn work" data-value="重量物">重量物</button>
    <button class="btn work" data-value="高所作業">高所作業</button>
    <button class="btn work" data-value="ねじり動作">ねじり動作</button>

    <button id="submitBtn" class="submit">送信する</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
