<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現場fit チェック</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <h2>現場fit チェック</h2>

  <!-- STEP1 -->
  <div id="step1">
    <p>部位</p>

    <button id="noPainBtn">特にない</button><br><br>

    <button data-value="腰">腰</button>
    <button data-value="肩">肩</button>
    <button data-value="膝">膝</button>
    <button data-value="その他">その他</button>

    <div id="otherPartWrap" style="display:none;">
      <input id="otherPart" placeholder="その他">
    </div>

    <br>
    <button id="toStep2" disabled>次へ</button>
  </div>

  <!-- STEP2 -->
  <div id="step2" style="display:none;">
    <p>痛み</p>
    <button data-score="1">1</button>
    <button data-score="2">2</button>
    <button data-score="3">3</button>
    <button data-score="4">4</button>
    <button data-score="5">5</button>

    <br><br>
    <button id="toStep3" disabled>次へ</button>
  </div>

  <!-- STEP3 -->
  <div id="step3" style="display:none;">
    <p>前週比</p>

    <button data-trend="良くなった">良くなった</button>
    <button data-trend="変わらない">変わらない</button>
    <button data-trend="悪くなった">悪くなった</button>

    <br><br>
    <button id="toStep4" disabled>次へ</button>
  </div>

  <!-- STEP4 -->
  <div id="step4" style="display:none;">
    <p>作業</p>

    <button data-work="中腰">中腰</button>
    <button data-work="重量物">重量物</button>
    <button data-work="その他">その他</button>

    <div id="otherWorkWrap" style="display:none;">
      <input id="otherWork" placeholder="その他作業">
    </div>

    <br><br>
    <button id="toStep5" disabled>次へ</button>
  </div>

  <!-- STEP5 -->
  <div id="step5" style="display:none;">
    <p>確認</p>
    <button id="submitBtn">送信</button>
  </div>

  <!-- 完了 -->
  <div id="done" style="display:none;">
    <h3>送信完了</h3>
  </div>

  <script src="script.js"></script>
</body>
</html>
