<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場fit チェック</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background:#f5f5f5;
}

.header {
  background:#1f8f4e;
  color:white;
  padding:20px;
}

.container {
  padding:20px;
}

.card {
  background:white;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}

.btn {
  width:100%;
  padding:15px;
  border-radius:12px;
  border:none;
  font-size:16px;
  margin-top:10px;
}

.primary {
  background:#1f8f4e;
  color:white;
}

.option {
  padding:12px;
  border:1px solid #ccc;
  border-radius:12px;
  text-align:center;
  margin:5px;
}

.selected {
  background:#1f8f4e;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
}
</style>
</head>

<body>

<div class="header">
  <h2>現場fit チェック</h2>
  <p>20秒で入力｜再発防止</p>
</div>

<div class="container">

<!-- STEP1 -->
<div class="card" id="step1">
  <h3>違和感の部位</h3>

  <button class="btn" onclick="selectNoPain()">特にない</button>

  <div class="grid">
    <div class="option" onclick="selectPart('腰')">腰</div>
    <div class="option" onclick="selectPart('肩')">肩</div>
    <div class="option" onclick="selectPart('膝')">膝</div>
    <div class="option" onclick="selectPart('その他')">その他</div>
  </div>

  <button class="btn primary" id="next1" disabled onclick="goStep(2)">次へ</button>
</div>

<!-- STEP2 -->
<div class="card" id="step2" style="display:none">
  <h3>痛みの強さ</h3>

  <div class="grid">
    <div class="option" onclick="selectScore(1)">😄 1</div>
    <div class="option" onclick="selectScore(2)">🙂 2</div>
    <div class="option" onclick="selectScore(3)">😐 3</div>
    <div class="option" onclick="selectScore(4)">😣 4</div>
    <div class="option" onclick="selectScore(5)">😫 5</div>
  </div>

  <button class="btn primary" id="next2" disabled onclick="goStep(3)">次へ</button>
</div>

<!-- STEP3 -->
<div class="card" id="step3" style="display:none">
  <h3>前週比</h3>

  <div class="grid">
    <div class="option" onclick="selectTrend('良くなった')">良くなった</div>
    <div class="option" onclick="selectTrend('変わらない')">変わらない</div>
    <div class="option" onclick="selectTrend('悪くなった')">悪くなった</div>
  </div>

  <button class="btn primary" id="next3" disabled onclick="goStep(4)">次へ</button>
</div>

<!-- STEP4 -->
<div class="card" id="step4" style="display:none">
  <h3>作業</h3>

  <div class="grid">
    <div class="option" onclick="selectWork('重量物')">重量物</div>
    <div class="option" onclick="selectWork('高所作業')">高所作業</div>
    <div class="option" onclick="selectWork('ねじり動作')">ねじり動作</div>
    <div class="option" onclick="selectWork('長時間')">長時間</div>
  </div>

  <button class="btn primary" onclick="submitData()">送信</button>
</div>

<!-- 完了 -->
<div class="card" id="done" style="display:none">
  <h3>送信完了</h3>
</div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxeNw-nT-GnATTog30-aOsWZpfTTNh_M0nluMxRdp6gYfHMLeqEY5pjj9PGEFnElG7U/exec";

const state = {
  part:"",
  score:null,
  trend:"",
  work:""
};

function goStep(n){
  document.querySelectorAll(".card").forEach(e=>e.style.display="none");
  document.getElementById("step"+n).style.display="block";
}

function selectNoPain(){
  state.part = "特にない";
  goStep(3);
}

function selectPart(v){
  state.part = v;
  document.getElementById("next1").disabled=false;
}

function selectScore(v){
  state.score = v;
  document.getElementById("next2").disabled=false;
}

function selectTrend(v){
  state.trend = v;
  document.getElementById("next3").disabled=false;
}

function selectWork(v){
  state.work = v;
}

async function submitData(){

  try{
    await fetch(GAS_URL,{
      method:"POST",
      body:JSON.stringify(state)
    });

    goStep("done");

  }catch(e){
    alert("送信失敗");
  }
}
</script>

</body>
</html>
