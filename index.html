<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFF確認</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f6f7f9;
      color: #111;
    }
    .card {
      max-width: 520px;
      margin: 40px auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    h1 {
      font-size: 24px;
      margin: 0 0 16px;
    }
    .status {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 16px;
      padding: 16px;
      border-radius: 12px;
      background: #f3f4f6;
    }
    .ok { color: #166534; }
    .ng { color: #b91c1c; }
  </style>
</head>
<body>
  <div class="card">
    <h1>LIFF動作確認</h1>
    <div id="status" class="status">読み込み中...</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
